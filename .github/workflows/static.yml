<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Skypower Group Inc. — Professional Security Services</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Barlow:wght@300;400;500;600&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #0f1f3d;
  --navy-mid: #162545;
  --navy-light: #1e3060;
  --gold: #d4b05a;
  --gold-light: #eacc7a;
  --gold-pale: #f0e0aa;
  --white: #f8f7f3;
  --muted: rgba(248,247,243,0.72);
  --border: rgba(212,176,90,0.28);
  --section-pad: clamp(64px, 10vw, 120px);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  background: var(--navy);
  color: var(--white);
  font-family: 'Barlow', sans-serif;
  font-weight: 400;
  line-height: 1.65;
  overflow-x: hidden;
}

/* ── TYPOGRAPHY ── */
.display {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 500;
  letter-spacing: -0.01em;
  line-height: 1.1;
}
.condensed {
  font-family: 'Barlow Condensed', sans-serif;
}
.eyebrow {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--gold);
}

/* ── NAV ── */
nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 clamp(20px, 5vw, 60px);
  height: 76px;
  background: rgba(15,31,61,0.94);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  transition: all 0.3s;
}
.nav-logo {
  display: flex;
  align-items: center;
  gap: 12px;
  text-decoration: none;
}
.nav-logo-mark {
  width: 38px;
  height: 38px;
  border: 1.5px solid var(--gold);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700;
  font-size: 14px;
  color: var(--gold);
  letter-spacing: 1px;
}
.nav-logo-text {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 15px;
  font-weight: 600;
  color: var(--white);
  letter-spacing: 1px;
  line-height: 1.2;
}
.nav-logo-sub {
  font-size: 10px;
  font-weight: 400;
  color: var(--gold);
  letter-spacing: 2px;
  text-transform: uppercase;
}
.nav-links {
  display: flex;
  align-items: center;
  gap: 32px;
  list-style: none;
}
.nav-links a {
  text-decoration: none;
  font-size: 13px;
  font-weight: 500;
  color: var(--muted);
  letter-spacing: 0.5px;
  transition: color 0.2s;
  cursor: pointer;
}
.nav-links a:hover { color: var(--white); }
.nav-cta {
  background: var(--gold);
  color: var(--navy) !important;
  padding: 9px 20px;
  font-weight: 600 !important;
  color: var(--navy);
  font-size: 13px;
  cursor: pointer;
  border: none;
  letter-spacing: 0.5px;
  transition: background 0.2s;
}
.nav-cta:hover { background: var(--gold-light) !important; }
.hamburger {
  display: none;
  flex-direction: column;
  gap: 5px;
  cursor: pointer;
  padding: 4px;
  background: none;
  border: none;
}
.hamburger span {
  display: block;
  width: 24px;
  height: 1.5px;
  background: var(--white);
  transition: all 0.3s;
}
.mobile-menu {
  display: none;
  position: fixed;
  top: 76px; left: 0; right: 0;
  background: var(--navy-mid);
  border-bottom: 1px solid var(--border);
  z-index: 99;
  padding: 20px clamp(20px, 5vw, 60px);
  flex-direction: column;
  gap: 0;
}
.mobile-menu a {
  text-decoration: none;
  color: var(--muted);
  font-size: 15px;
  font-weight: 500;
  padding: 14px 0;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  display: block;
}
.mobile-menu a:last-child { border-bottom: none; }
.mobile-menu.open { display: flex; }

/* ── PAGE SYSTEM ── */
.page { display: none; }
.page.active { display: block; }

/* ── HERO ── */
.hero {
  min-height: 100vh;
  padding-top: 76px;
  display: flex;
  flex-direction: column;
  position: relative;
  overflow: hidden;
}
.hero-bg {
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 60% at 70% 40%, rgba(201,168,76,0.06) 0%, transparent 60%),
    radial-gradient(ellipse 60% 80% at 10% 80%, rgba(14,26,46,0.8) 0%, transparent 50%);
}
.hero-grid-overlay {
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(201,168,76,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(201,168,76,0.04) 1px, transparent 1px);
  background-size: 60px 60px;
}
.hero-content {
  position: relative;
  display: flex;
  flex-direction: column;
  justify-content: center;
  min-height: calc(100vh - 72px);
  padding: 60px clamp(20px, 5vw, 80px);
  max-width: 1200px;
  margin: 0 auto;
  width: 100%;
}
.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 32px;
}
.hero-badge-line { width: 40px; height: 1px; background: var(--gold); }
.hero h1 {
  font-size: clamp(44px, 7vw, 88px);
  margin-bottom: 24px;
  max-width: 800px;
}
.hero h1 em {
  font-style: italic;
  color: var(--gold);
}
.hero-desc {
  font-size: clamp(15px, 2vw, 18px);
  color: var(--muted);
  max-width: 540px;
  margin-bottom: 44px;
  line-height: 1.75;
  font-weight: 300;
}
.hero-actions {
  display: flex;
  flex-wrap: wrap;
  gap: 14px;
  margin-bottom: 64px;
}
.btn-primary {
  display: inline-block;
  background: var(--gold);
  color: var(--navy);
  padding: 14px 32px;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  cursor: pointer;
  border: none;
  text-decoration: none;
  transition: background 0.2s, transform 0.1s;
}
.btn-primary:hover { background: var(--gold-light); transform: translateY(-1px); }
.btn-outline {
  display: inline-block;
  background: transparent;
  color: var(--white);
  padding: 13px 32px;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  cursor: pointer;
  border: 1px solid rgba(248,247,243,0.3);
  text-decoration: none;
  transition: border-color 0.2s, color 0.2s;
}
.btn-outline:hover { border-color: var(--gold); color: var(--gold); }
.hero-stats {
  display: flex;
  gap: clamp(24px, 5vw, 60px);
  flex-wrap: wrap;
  padding-top: 40px;
  border-top: 1px solid var(--border);
}
.hero-stat-num {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(32px, 4vw, 48px);
  font-weight: 500;
  color: var(--gold);
  line-height: 1;
}
.hero-stat-label {
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 1px;
  margin-top: 4px;
  text-transform: uppercase;
}

/* ── SECTIONS ── */
.section {
  padding: var(--section-pad) clamp(20px, 5vw, 80px);
  max-width: 1200px;
  margin: 0 auto;
}
.full-section {
  padding: var(--section-pad) clamp(20px, 5vw, 80px);
}
.section-header { margin-bottom: clamp(40px, 6vw, 72px); }
.section-header h2 {
  font-size: clamp(32px, 5vw, 58px);
  margin-top: 12px;
  max-width: 680px;
}

/* ── DIVIDER ── */
.gold-rule {
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  opacity: 0.3;
  margin: 0 clamp(20px, 5vw, 80px);
}

/* ── ABOUT PAGE ── */
.about-intro {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: clamp(40px, 6vw, 100px);
  align-items: center;
  margin-bottom: 72px;
}
.about-text h2 { font-size: clamp(30px, 4vw, 52px); margin: 12px 0 24px; }
.about-text p { color: var(--muted); line-height: 1.85; margin-bottom: 16px; font-weight: 300; }
.about-visual {
  position: relative;
  height: 400px;
}
.about-box {
  position: absolute;
  inset: 0;
  border: 1px solid var(--border);
  background: var(--navy-mid);
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}
.about-box::before {
  content: '';
  position: absolute;
  top: -1px; left: 20px; right: 20px;
  height: 2px;
  background: var(--gold);
  opacity: 0.6;
}
.shield-svg { opacity: 0.12; }
.about-corner {
  position: absolute;
  bottom: -16px;
  right: -16px;
  width: 100px;
  height: 100px;
  border: 1px solid var(--border);
  background: var(--navy-light);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 4px;
}
.about-values {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 1px;
  background: var(--border);
  border: 1px solid var(--border);
  margin-bottom: 72px;
}
.value-cell {
  background: var(--navy);
  padding: 32px 28px;
  transition: background 0.2s;
}
.value-cell:hover { background: var(--navy-mid); }
.value-num {
  font-family: 'Cormorant Garamond', serif;
  font-size: 40px;
  color: var(--gold);
  opacity: 0.4;
  line-height: 1;
  margin-bottom: 16px;
}
.value-cell h3 { font-size: 15px; font-weight: 600; margin-bottom: 8px; }
.value-cell p { font-size: 13px; color: var(--muted); line-height: 1.7; font-weight: 300; }
.leadership { margin-bottom: 0; }
.leadership h2 { font-size: clamp(28px, 4vw, 44px); margin: 12px 0 40px; }
.leadership-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 24px; }
.leader-card {
  border: 1px solid var(--border);
  padding: 28px 24px;
  position: relative;
  transition: border-color 0.2s;
}
.leader-card:hover { border-color: rgba(201,168,76,0.4); }
.leader-initials {
  width: 52px; height: 52px;
  background: var(--navy-light);
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Cormorant Garamond', serif;
  font-size: 20px;
  color: var(--gold);
  margin-bottom: 16px;
}
.leader-card h3 { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
.leader-card p { font-size: 12px; color: var(--gold); letter-spacing: 1px; text-transform: uppercase; font-family: 'Barlow Condensed', sans-serif; }

/* ── SERVICES PAGE ── */
.services-intro { margin-bottom: 60px; }
.services-intro p { color: var(--muted); font-size: 17px; max-width: 620px; font-weight: 300; line-height: 1.8; }
.services-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 1px;
  background: var(--border);
  border: 1px solid var(--border);
  margin-bottom: 72px;
}
.service-card {
  background: var(--navy);
  padding: 36px 32px;
  position: relative;
  overflow: hidden;
  transition: background 0.25s;
}
.service-card::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0;
  width: 0; height: 2px;
  background: var(--gold);
  transition: width 0.35s;
}
.service-card:hover { background: var(--navy-mid); }
.service-card:hover::after { width: 100%; }
.service-icon {
  width: 44px; height: 44px;
  border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 20px;
  font-size: 20px;
}
.service-card h3 { font-size: 16px; font-weight: 600; margin-bottom: 10px; }
.service-card p { font-size: 13px; color: var(--muted); line-height: 1.75; font-weight: 300; }
.service-tag {
  display: inline-block;
  margin-top: 16px;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--gold);
  border: 1px solid rgba(201,168,76,0.3);
  padding: 4px 10px;
}
.why-strip {
  background: var(--navy-mid);
  border: 1px solid var(--border);
  padding: 48px clamp(24px, 5vw, 64px);
  margin-bottom: 0;
}
.why-strip h2 { font-size: clamp(26px, 3.5vw, 42px); margin: 12px 0 36px; }
.why-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 32px; }
.why-item h4 { font-size: 14px; font-weight: 600; margin-bottom: 8px; padding-top: 12px; border-top: 2px solid var(--gold); }
.why-item p { font-size: 13px; color: var(--muted); font-weight: 300; line-height: 1.7; }

/* ── CONTACT PAGE ── */
.contact-grid {
  display: grid;
  grid-template-columns: 1fr 1.2fr;
  gap: clamp(40px, 6vw, 80px);
  align-items: start;
}
.contact-info h2 { font-size: clamp(28px, 4vw, 48px); margin: 12px 0 20px; }
.contact-info > p { color: var(--muted); font-size: 15px; line-height: 1.8; font-weight: 300; margin-bottom: 40px; }
.contact-method { display: flex; gap: 16px; align-items: flex-start; margin-bottom: 28px; }
.contact-method-icon {
  width: 40px; height: 40px;
  border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  font-size: 16px;
  color: var(--gold);
}
.contact-method-label { font-size: 10px; text-transform: uppercase; letter-spacing: 2px; color: var(--gold); font-family: 'Barlow Condensed', sans-serif; font-weight: 600; margin-bottom: 4px; }
.contact-method-value { font-size: 14px; color: var(--white); }
.contact-method-note { font-size: 12px; color: var(--muted); margin-top: 2px; }
.form-card {
  background: var(--navy-mid);
  border: 1px solid var(--border);
  padding: clamp(24px, 4vw, 44px);
}
.form-card h3 { font-size: 20px; font-weight: 600; margin-bottom: 8px; }
.form-card > p { font-size: 13px; color: var(--muted); margin-bottom: 28px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.form-group { margin-bottom: 16px; }
.form-group label { display: block; font-size: 11px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: var(--gold); margin-bottom: 8px; font-family: 'Barlow Condensed', sans-serif; }
.form-group input,
.form-group select,
.form-group textarea {
  width: 100%;
  background: var(--navy);
  border: 1px solid rgba(201,168,76,0.2);
  color: var(--white);
  padding: 12px 14px;
  font-family: 'Barlow', sans-serif;
  font-size: 14px;
  outline: none;
  transition: border-color 0.2s;
  appearance: none;
}
.form-group input::placeholder,
.form-group textarea::placeholder { color: rgba(248,247,243,0.25); }
.form-group input:focus,
.form-group select:focus,
.form-group textarea:focus { border-color: var(--gold); }
.form-group textarea { height: 100px; resize: none; }
.form-group select { cursor: pointer; }
.form-group select option { background: var(--navy-mid); }
.form-submit {
  width: 100%;
  margin-top: 8px;
  background: var(--gold);
  color: var(--navy);
  padding: 14px;
  border: none;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  cursor: pointer;
  transition: background 0.2s;
}
.form-submit:hover { background: var(--gold-light); }
.success-msg { display: none; text-align: center; padding: 20px; color: var(--gold); font-family: 'Barlow Condensed', sans-serif; font-size: 15px; letter-spacing: 1px; }

/* ── QUOTE PAGE ── */
.quote-intro { margin-bottom: 48px; }
.quote-intro h2 { font-size: clamp(28px, 4vw, 52px); margin: 12px 0 16px; }
.quote-intro p { color: var(--muted); font-size: 15px; font-weight: 300; max-width: 580px; line-height: 1.8; }
.quote-form {
  background: var(--navy-mid);
  border: 1px solid var(--border);
  padding: clamp(24px, 4vw, 48px);
  max-width: 800px;
}
.quote-step-bar { display: flex; gap: 0; margin-bottom: 36px; }
.qstep {
  flex: 1;
  text-align: center;
  padding: 10px;
  border-bottom: 2px solid rgba(201,168,76,0.15);
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 12px;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--muted);
  transition: all 0.3s;
}
.qstep.active { border-bottom-color: var(--gold); color: var(--gold); font-weight: 600; }
.qstep.done { border-bottom-color: rgba(201,168,76,0.5); color: rgba(201,168,76,0.6); }
.quote-panel { display: none; }
.quote-panel.active { display: block; }
.quote-panel h3 { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
.quote-panel > p { font-size: 13px; color: var(--muted); margin-bottom: 24px; }
.checkbox-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
.checkbox-item { display: flex; align-items: center; gap: 10px; cursor: pointer; font-size: 14px; color: var(--muted); }
.checkbox-item input[type="checkbox"] { accent-color: var(--gold); width: 16px; height: 16px; cursor: pointer; }
.quote-nav { display: flex; justify-content: space-between; margin-top: 24px; }
.btn-back { background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 10px 24px; font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; transition: all 0.2s; }
.btn-back:hover { border-color: var(--gold); color: var(--white); }
.btn-next { background: var(--gold); color: var(--navy); padding: 10px 28px; border: none; font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; cursor: pointer; transition: background 0.2s; }
.btn-next:hover { background: var(--gold-light); }

/* ── HOME SERVICE STRIP ── */
.home-services {
  background: var(--navy-mid);
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  padding: 72px clamp(20px, 5vw, 80px);
}
.home-services-inner { max-width: 1200px; margin: 0 auto; }
.home-services h2 { font-size: clamp(28px, 4vw, 52px); margin: 12px 0 48px; max-width: 540px; }
.home-service-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 24px; }
.hsl-item { border-left: 2px solid rgba(201,168,76,0.3); padding-left: 20px; transition: border-color 0.2s; }
.hsl-item:hover { border-left-color: var(--gold); }
.hsl-item h3 { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
.hsl-item p { font-size: 13px; color: var(--muted); font-weight: 300; }
.home-cta {
  text-align: center;
  padding: var(--section-pad) clamp(20px, 5vw, 80px);
  max-width: 1200px;
  margin: 0 auto;
}
.home-cta h2 { font-size: clamp(30px, 5vw, 60px); margin: 12px 0 20px; }
.home-cta p { color: var(--muted); font-size: 16px; font-weight: 300; max-width: 480px; margin: 0 auto 40px; }
.home-clients {
  padding: 48px clamp(20px, 5vw, 80px);
  max-width: 1200px;
  margin: 0 auto;
  text-align: center;
}
.client-row { display: flex; align-items: center; justify-content: center; gap: clamp(24px, 4vw, 60px); flex-wrap: wrap; margin-top: 28px; }
.client-pill {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 12px;
  letter-spacing: 2px;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  border: 1px solid var(--border);
  padding: 8px 20px;
}

/* ── FOOTER ── */
footer {
  border-top: 1px solid var(--border);
  padding: 48px clamp(20px, 5vw, 80px) 32px;
  margin-top: 0;
}
.footer-inner {
  max-width: 1200px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: 2fr 1fr 1fr 1fr;
  gap: 40px;
  margin-bottom: 40px;
}
.footer-brand p { font-size: 13px; color: var(--muted); font-weight: 300; max-width: 280px; margin-top: 16px; line-height: 1.75; }
.footer-col h4 { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--gold); margin-bottom: 16px; }
.footer-col a { display: block; font-size: 13px; color: var(--muted); margin-bottom: 10px; cursor: pointer; text-decoration: none; transition: color 0.2s; }
.footer-col a:hover { color: var(--white); }
.footer-bottom {
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding-top: 24px;
  border-top: 1px solid var(--border);
  font-size: 12px;
