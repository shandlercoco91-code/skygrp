<script>
function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  window.scrollTo(0, 0);
}

function toggleMenu() {
  document.getElementById('mobileMenu').classList.toggle('open');
}

let currentStep = 1;
function goStep(n) {
  document.getElementById('qp-' + currentStep).classList.remove('active');
  document.getElementById('qbar-' + currentStep).classList.remove('active');
  document.getElementById('qbar-' + currentStep).classList.add('done');
  currentStep = n;
  document.getElementById('qp-' + n).classList.add('active');
  document.getElementById('qbar-' + n).classList.add('active');
  document.getElementById('qbar-' + n).classList.remove('done');
}

function submitQuote() {
  document.getElementById('qp-4').classList.remove('active');
  document.getElementById('qbar-4').classList.remove('active');
  document.getElementById('qbar-4').classList.add('done');
  document.querySelector('.quote-step-bar').style.display = 'none';
  document.getElementById('qp-success').classList.add('active');
}

function submitContact() {
  document.getElementById('contactForm').style.display = 'none';
  const s = document.getElementById('contactSuccess');
  s.style.display = 'block';
  s.style.padding = '40px 20px';
  s.style.fontSize = '15px';
}

function toggleJob(id) {
  var panel = document.getElementById(id);
  var arr = document.getElementById('arr-' + id);
  if (panel.style.display === 'none') {
    panel.style.display = 'block';
    arr.textContent = '−';
  } else {
    panel.style.display = 'none';
    arr.textContent = '+';
  }
}

function openApp(position) {
  document.getElementById('app-position-title').textContent = position;
  document.getElementById('app-form-body').style.display = 'block';
  document.getElementById('app-success').style.display = 'none';
  document.getElementById('app-modal').style.display = 'block';
  document.body.style.overflow = 'hidden';
}

function closeApp() {
  document.getElementById('app-modal').style.display = 'none';
  document.body.style.overflow = '';
}

function submitApp() {
  document.getElementById('app-form-body').style.display = 'none';
  document.getElementById('app-success').style.display = 'block';
}
</script>

