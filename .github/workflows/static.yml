              <div style="font-size:12px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold);font-family:'Barlow Condensed',sans-serif;margin-bottom:10px">Requirements</div>
              <ul style="font-size:13px;color:var(--muted);line-height:2;padding-left:16px;font-weight:300">
                <li>2+ years security experience</li>
                <li>Prior supervisory or leadership role preferred</li>
                <li>Active security license</li>
                <li>Excellent communication skills</li>
                <li>Background check required</li>
              </ul>
            </div>
          </div>
          <button class="btn-primary" style="margin-top:20px" onclick="openApp('Shift Supervisor')">Apply for This Position</button>
        </div>
      </div>

      <!-- Event Security -->
      <div class="job-card" style="border:1px solid var(--border);margin-bottom:12px;background:var(--navy-mid);transition:border-color 0.2s" onmouseover="this.style.borderColor='rgba(212,176,90,0.45)'" onmouseout="this.style.borderColor='var(--border)'">
        <div style="display:flex;align-items:center;justify-content:space-between;padding:20px 24px;cursor:pointer;gap:16px;flex-wrap:wrap" onclick="toggleJob('j5')">
          <div>
            <div style="font-size:15px;font-weight:600">Event Security Specialist</div>
            <div style="font-size:12px;color:var(--muted);margin-top:3px">Various Venues &nbsp;·&nbsp; Part-Time / As Needed &nbsp;·&nbsp; 1099</div>
          </div>
          <div style="display:flex;align-items:center;gap:10px">
            <span style="font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--gold);border:1px solid rgba(212,176,90,0.35);padding:4px 12px">Now Hiring</span>
            <span style="color:var(--gold);font-size:18px" id="arr-j5">+</span>
          </div>
        </div>
        <div id="j5" style="display:none;padding:0 24px 24px;border-top:1px solid var(--border)">
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-top:20px">
            <div>
              <div style="font-size:12px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold);font-family:'Barlow Condensed',sans-serif;margin-bottom:10px">Responsibilities</div>
              <ul style="font-size:13px;color:var(--muted);line-height:2;padding-left:16px;font-weight:300">
                <li>Crowd management at events of all sizes</li>
                <li>Access control and ticket verification support</li>
                <li>De-escalate situations professionally</li>
                <li>Coordinate with event staff and local law enforcement</li>
                <li>Complete post-event incident reports</li>
              </ul>
            </div>
            <div>
              <div style="font-size:12px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold);font-family:'Barlow Condensed',sans-serif;margin-bottom:10px">Requirements</div>
              <ul style="font-size:13px;color:var(--muted);line-height:2;padding-left:16px;font-weight:300">
                <li>Security license preferred</li>
                <li>Event or crowd management experience a plus</li>
                <li>Calm under pressure</li>
                <li>Available weekends and evenings</li>
                <li>Background check required</li>
              </ul>
            </div>
          </div>
          <button class="btn-primary" style="margin-top:20px" onclick="openApp('Event Security Specialist')">Apply for This Position</button>
        </div>
      </div>
    </div>

    <!-- Application Modal -->
    <div id="app-modal" style="display:none;position:fixed;inset:0;background:rgba(8,15,30,0.88);z-index:200;overflow-y:auto;padding:20px">
      <div style="max-width:680px;margin:60px auto;background:var(--navy-mid);border:1px solid var(--border)">
        <div style="display:flex;align-items:center;justify-content:space-between;padding:20px 28px;border-bottom:1px solid var(--border)">
          <div>
            <div style="font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);font-family:'Barlow Condensed',sans-serif;margin-bottom:4px">Application</div>
            <div style="font-size:16px;font-weight:600" id="app-position-title">Position</div>
          </div>
          <button onclick="closeApp()" style="background:none;border:1px solid var(--border);color:var(--muted);width:32px;height:32px;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center">×</button>
        </div>
        <div style="padding:28px" id="app-form-body">
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
            <div class="form-group"><label>First Name</label><input type="text" placeholder="First name"></div>
            <div class="form-group"><label>Last Name</label><input type="text" placeholder="Last name"></div>
          </div>
          <div class="form-group"><label>Email Address</label><input type="email" placeholder="your@email.com"></div>
          <div class="form-group"><label>Phone Number</label><input type="tel" placeholder="(555) 000-0000"></div>
          <div class="form-group"><label>City & State You Live In</label><input type="text" placeholder="e.g. Los Angeles, CA"></div>
          <div class="form-group">
            <label>Do You Have a Valid Security Guard License?</label>
            <select><option>Yes — active license</option><option>In progress / pending</option><option>No — willing to obtain</option></select>
          </div>
          <div class="form-group">
            <label>Employment Type Preference</label>
            <select><option>W2 (employee)</option><option>1099 (independent contractor)</option><option>Open to either</option></select>
          </div>
          <div class="form-group">
            <label>Availability</label>
            <select><option>Days (6AM–6PM)</option><option>Nights (6PM–6AM)</option><option>Overnight (10PM–6AM)</option><option>Weekends only</option><option>Flexible / any shift</option></select>
          </div>
          <div class="form-group"><label>Relevant Experience (Brief Summary)</label><textarea placeholder="Describe any prior security, military, law enforcement, or related experience..."></textarea></div>
          <div class="form-group"><label>Why Do You Want to Join Skypower?</label><textarea placeholder="Tell us why you'd be a great fit for our team..."></textarea></div>
          <div style="background:var(--navy);border:1px solid var(--border);padding:14px;margin-bottom:16px;font-size:12px;color:var(--muted);line-height:1.7">
            By submitting this application you consent to a background check as part of the hiring process. All information provided is kept confidential.
          </div>
          <button class="form-submit" onclick="submitApp()">Submit Application</button>
        </div>
        <div id="app-success" style="display:none;text-align:center;padding:48px 28px">
          <div style="font-size:40px;margin-bottom:16px">✓</div>
          <div style="font-size:18px;font-weight:600;margin-bottom:10px">Application Submitted</div>
          <p style="color:var(--muted);font-size:14px;margin-bottom:24px">Thank you for your interest in joining The Skypower Group Inc. Our HR team will review your application and reach out within 3–5 business days.</p>
          <button class="btn-outline" onclick="closeApp()">Back to Careers</button>
        </div>
      </div>
    </div>
  </div>

  <footer style="margin-top:var(--section-pad)">
    <div class="footer-inner">
      <div class="footer-brand"><img src="data:image/png;base64," alt="Sky Power Group Inc" style="height:60px;width:auto;display:block;margin-bottom:8px"><p>The Skypower Group Inc. — professional security services deployed with precision, accountability, and integrity.</p></div>
      <div class="footer-col"><h4>Company</h4><a onclick="showPage('home')">Home</a><a onclick="showPage('about')">About Us</a><a onclick="showPage('services')">Services</a><a onclick="showPage('careers')">Careers</a><a onclick="showPage('contact')">Contact</a></div>
      <div class="footer-col"><h4>Services</h4><a onclick="showPage('services')">Static Guard</a><a onclick="showPage('services')">Mobile Patrol</a><a onclick="showPage('services')">Event Security</a><a onclick="showPage('services')">Corporate</a></div>
      <div class="footer-col"><h4>Contact</h4><a>admin@theskygrp.info</a><a>(866) 673-9095</a><a onclick="showPage('quote')">Request a Quote</a></div>
    </div>
    <div class="footer-bottom"><span>© 2026 The Skypower Group Inc. All rights reserved.</span><div class="footer-cert"><span class="cert-badge">Licensed</span><span class="cert-badge">Bonded</span><span class="cert-badge">Insured</span></div></div>
  </footer>
</div>

</body>
</html>
